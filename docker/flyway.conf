# =============================================================================
# AyNesil Platform :: Flyway Configuration
# Bağlantı bilgileri docker-compose env vars ile override edilir.
# =============================================================================

# ── Schema & History Table ───────────────────────────────────────────────────
# Flyway history tablosu public schema'da tutulur.
# Neden public? V1 DDL'i core schema'yı oluştururken Flyway history tablosuna
# ihtiyaç duyar → tavuk-yumurta sorunu yaşamamak için public kullanılır.
flyway.defaultSchema=public
flyway.table=flyway_schema_history

# ── Locations ────────────────────────────────────────────────────────────────
flyway.locations=filesystem:/flyway/sql

# ── Migration Prefix/Separator ───────────────────────────────────────────────
flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
flyway.repeatableSqlMigrationPrefix=R

# ── Validation ───────────────────────────────────────────────────────────────
# Her migrate komutunda checksum doğrulaması yap (dosya değişikliği algılar)
flyway.validateOnMigrate=true

# Uygulanan migration'lar arasında boşluk olmasına izin verme
flyway.outOfOrder=false

# Mevcut DB'ye baseline uygulamak için: docker compose run flyway baseline
flyway.baselineOnMigrate=false

# ── Encoding ─────────────────────────────────────────────────────────────────
flyway.encoding=UTF-8

# ── Connection Retry ─────────────────────────────────────────────────────────
# PostgreSQL container ready olana kadar bekle
flyway.connectRetries=15
flyway.connectRetriesInterval=3

# ── Placeholders (docker-compose env vars ile geçersiz kılınır) ───────────────
# flyway.appRole kullanıcı tanımlı custom placeholder (afterMigrate callback kullanır)
flyway.placeholders.appRole=aynesil_app
flyway.placeholderPrefix=$[
flyway.placeholderSuffix=]

# ── SQL migration execution ───────────────────────────────────────────────────
# Tek transaction'da migration başarısız olursa rollback et
flyway.group=false

# PostgreSQL'e özgü: Mixed-mode transaction (DDL + DML karışık)
# PostgreSQL DDL'i transactional destekler, bu yüzden true güvenli
flyway.mixed=true
